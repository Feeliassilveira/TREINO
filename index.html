<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Treino Fibrado 💪</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #070710;
    --bg2: #0e0e1a;
    --bg3: #0a0a14;
    --border: #1c1c2a;
    --text: #e8e8e0;
    --muted: #444;
    --dim: #252535;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-thumb { background: #252535; border-radius: 2px; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
  @keyframes modalPop { from { opacity:0; transform:scale(0.94) } to { opacity:1; transform:scale(1) } }
  @keyframes dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg,#0e0e1c 0%,#070710 100%);
    padding: 16px 16px 12px;
    border-bottom: 2px solid var(--accent, #FF6B35);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .header-label { font-size: 9px; letter-spacing: 5px; font-weight: 700; }
  .header-title { font-size: 24px; font-weight: 900; letter-spacing: 0.5px; line-height: 1.1; }
  .week-badge { border-radius: 12px; padding: 8px 14px; text-align: center; min-width: 64px; }
  .week-badge-num { font-size: 24px; font-weight: 900; line-height: 1; }
  .week-badge-lbl { font-size: 8px; color: #444; letter-spacing: 2px; margin-top: 2px; }
  .nav { display: flex; gap: 6px; }
  .nav-btn { flex: 1; padding: 9px 0; border-radius: 9px; font-family: inherit; font-weight: 800; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: all .22s; border: 1px solid #1e1e2e; background: #12121e; color: #444; }
  .nav-btn.active { color: #000; }

  .day-tabs { display: flex; gap: 6px; padding: 14px 14px 0; overflow-x: auto; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-btn { flex: 0 0 auto; min-width: 62px; background: var(--bg2); color: #555; border: 1.5px solid var(--border); border-radius: 13px; padding: 10px 8px 8px; font-family: inherit; cursor: pointer; transition: all .22s; position: relative; text-align: center; }
  .day-btn.active { color: #000; }
  .day-btn-dot { position: absolute; top: -4px; right: -4px; width: 10px; height: 10px; border-radius: 50%; animation: dot 2s infinite; }

  .day-info { padding: 16px 16px 10px; }
  .day-info-label { font-size: 9px; letter-spacing: 5px; font-weight: 700; }
  .day-info-title { font-size: 30px; font-weight: 900; letter-spacing: 0.3px; }
  .prog-bar-meta { display: flex; justify-content: space-between; margin-bottom: 5px; margin-top: 10px; }
  .prog-bar-meta span { font-size: 11px; color: #444; }
  .prog-bar-bg { height: 4px; background: #14141e; border-radius: 2px; }
  .prog-bar-fill { height: 100%; border-radius: 2px; transition: width .5s; }

  .cards { padding: 2px 14px 80px; display: flex; flex-direction: column; gap: 8px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; animation: fadeUp .3s ease both; transition: border-color .3s, background .3s; }
  .card-top { display: flex; align-items: center; gap: 10px; padding: 14px; }
  .check-btn { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0; background: transparent; border: 2px solid #2a2a3a; color: #000; font-size: 16px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .22s; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 800; letter-spacing: 0.2px; color: #e8e8e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color .3s; }
  .card-name.done { color: #444; text-decoration: line-through; }
  .card-sets { font-size: 11px; color: #3a3a50; margin-top: 3px; font-family: 'Barlow', sans-serif; }
  .img-btn { flex-shrink: 0; border-radius: 10px; padding: 8px 12px; font-family: inherit; font-weight: 800; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 5px; border: none; }

  .card-load { border-top: 1px solid #14141e; padding: 10px 14px; background: var(--bg3); display: flex; align-items: center; gap: 10px; }
  .load-label { font-size: 9px; letter-spacing: 3px; color: #2a2a40; font-weight: 700; }
  .load-display { display: flex; align-items: center; gap: 8px; flex: 1; }
  .load-kg { font-size: 19px; font-weight: 900; }
  .load-unit { font-size: 10px; color: #444; font-weight: 400; }
  .load-diff { font-size: 11px; font-weight: 800; }
  .load-empty { font-size: 12px; color: #252535; font-family: 'Barlow', sans-serif; }
  .load-edit-btn { margin-left: auto; background: transparent; border: 1px solid #1e1e2e; color: #404060; border-radius: 7px; padding: 5px 11px; font-family: inherit; font-weight: 800; font-size: 10px; cursor: pointer; }
  .load-input-wrap { display: flex; gap: 6px; align-items: center; flex: 1; }
  .load-input { width: 72px; padding: 5px 10px; background: #16162a; border-radius: 7px; color: #fff; font-family: inherit; font-weight: 700; font-size: 14px; outline: none; }
  .load-ok { border: none; border-radius: 7px; padding: 5px 13px; font-family: inherit; font-weight: 800; font-size: 12px; cursor: pointer; color: #000; }
  .load-cancel { background: transparent; border: 1px solid #2a2a3a; color: #555; border-radius: 7px; padding: 5px 9px; font-family: inherit; font-weight: 700; font-size: 11px; cursor: pointer; }
  .sparkline { padding: 6px 14px 10px; display: flex; gap: 3px; align-items: flex-end; height: 26px; }
  .spark-bar { flex: 1; max-width: 22px; border-radius: 2px; transition: height .3s; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.94); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-box { width: 100%; max-width: 480px; background: #0e0e1a; border-radius: 20px; overflow: hidden; animation: modalPop 0.25s ease; }
  .modal-header { padding: 16px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #1a1a2a; }
  .modal-header-info { flex: 1; }
  .modal-header-tag { font-size: 9px; letter-spacing: 4px; font-weight: 700; margin-bottom: 2px; }
  .modal-header-name { font-size: 18px; font-weight: 900; letter-spacing: 0.3px; line-height: 1.1; }
  .modal-close { width: 34px; height: 34px; border-radius: 10px; background: #1a1a28; border: 1px solid #2a2a3a; color: #666; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-img-wrap { position: relative; background: #000; width: 100%; height: 260px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .modal-img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #333; }
  .modal-img-placeholder span { font-size: 48px; }
  .modal-img-placeholder p { font-size: 13px; color: #444; }
  .modal-footer { padding: 14px 18px 16px; background: #0a0a14; }
  .modal-tip { border-radius: 10px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .modal-tip-text { font-size: 13px; color: #bbb; line-height: 1.5; font-family: 'Barlow', sans-serif; }
  .modal-stats { display: flex; gap: 8px; }
  .modal-stat { flex: 1; text-align: center; border-radius: 10px; padding: 10px 8px; }
  .modal-stat-val { font-size: 24px; font-weight: 900; line-height: 1; }
  .modal-stat-lbl { font-size: 9px; color: #555; letter-spacing: 3px; margin-top: 4px; }

  .prog-view { padding: 18px 14px 80px; }
  .prog-section-lbl { font-size: 9px; letter-spacing: 5px; color: #333; font-weight: 700; margin-bottom: 12px; }
  .prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 28px; }
  .prog-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; }
  .prog-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .prog-card-label { font-size: 12px; font-weight: 800; }
  .prog-card-sub { font-size: 9px; color: #333; letter-spacing: 1px; }
  .prog-card-pct { font-size: 22px; font-weight: 900; }
  .prog-card-bar-bg { height: 3px; background: #14141e; border-radius: 2px; }
  .prog-card-bar { height: 100%; border-radius: 2px; }
  .prog-card-count { font-size: 9px; color: #2a2a3a; margin-top: 6px; }
  .hist-section { margin-bottom: 18px; }
  .hist-day-lbl { font-size: 11px; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; }
  .hist-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .hist-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hist-card-name { font-size: 13px; font-weight: 800; }
  .hist-card-kg { font-size: 20px; font-weight: 900; }
  .hist-sparkline { display: flex; gap: 3px; align-items: flex-end; height: 28px; }
  .hist-spark-bar { flex: 1; border-radius: 2px; }
  .hist-dates { display: flex; justify-content: space-between; margin-top: 4px; }
  .hist-dates span { font-size: 8px; color: #252535; }
  .empty-hist { text-align: center; padding: 50px 20px; color: #252535; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const workoutPlan = {
  "Segunda": {
    label: "PEITO + TRÍCEPS", icon: "🏋️", color: "#FF6B35",
    exercises: [
      { id: "s1", name: "Supino Reto com Barra",    series: 4, reps: "10-12", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Bench_press_2.jpg/640px-Bench_press_2.jpg", tip: "Mantenha os pés no chão e escápulas retraídas" },
      { id: "s2", name: "Supino Inclinado Haltere",  series: 3, reps: "12",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Incline-dumbbell-bench-press-top.png/640px-Incline-dumbbell-bench-press-top.png", tip: "Incline o banco a 30-45° para focar na parte superior" },
      { id: "s3", name: "Crucifixo na Polia",        series: 3, reps: "15",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Cable-fly-top.png/640px-Cable-fly-top.png", tip: "Mantenha leve flexão nos cotovelos durante todo o movimento" },
      { id: "s4", name: "Tríceps Corda na Polia",    series: 4, reps: "12-15", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Triceps-pushdown-IM-top.png/640px-Triceps-pushdown-IM-top.png", tip: "Abra a corda no final para maior contração" },
      { id: "s5", name: "Tríceps Testa",             series: 3, reps: "12",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Skull-crusher-IM-top.png/640px-Skull-crusher-IM-top.png", tip: "Mantenha os cotovelos fixos apontando para o teto" },
    ]
  },
  "Terça": {
    label: "COSTAS + BÍCEPS", icon: "🦅", color: "#4ECDC4",
    exercises: [
      { id: "t1", name: "Puxada Frontal",   series: 4, reps: "10-12", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Lat-pulldown-IM-top.png/640px-Lat-pulldown-IM-top.png", tip: "Puxe até o queixo e contraia as escápulas" },
      { id: "t2", name: "Remada Curvada",   series: 4, reps: "10-12", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Bent-over-row-IM-top.png/640px-Bent-over-row-IM-top.png", tip: "Mantenha as costas retas e puxe até o umbigo" },
      { id: "t3", name: "Remada Cavalinho", series: 3, reps: "12",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Seated-cable-rows-IM-top.png/640px-Seated-cable-rows-IM-top.png", tip: "Coxas paralelas ao chão, puxe com os cotovelos" },
      { id: "t4", name: "Rosca Direta",     series: 3, reps: "12",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Barbell-curl-IM-top.png/640px-Barbell-curl-IM-top.png", tip: "Não balance o corpo, isolamento total do bíceps" },
      { id: "t5", name: "Rosca Martelo",    series: 3, reps: "12",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Hammer-curls-IM-top.png/640px-Hammer-curls-IM-top.png", tip: "Polegar aponta para o teto em todo o movimento" },
    ]
  },
  "Quarta": {
    label: "PERNAS + GLÚTEO", icon: "🦵", color: "#A855F7",
    exercises: [
      { id: "q1", name: "Agachamento Livre",   series: 4, reps: "10-12", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/thirty/Squat_at_the_2013_IPC_Athletic_World_Championships_(8643930026).jpg/640px-Squat_at_the_2013_IPC_Athletic_World_Championships_(8643930026).jpg", tip: "Joelhos na direção dos pés, desça até 90°" },
      { id: "q2", name: "Leg Press",           series: 4, reps: "12-15", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Leg-press-IM-top.png/640px-Leg-press-IM-top.png", tip: "Não trave os joelhos na extensão" },
      { id: "q3", name: "Cadeira Extensora",   series: 3, reps: "15",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Leg-extension-IM-top.png/640px-Leg-extension-IM-top.png", tip: "Segure 1s no topo para maior ativação" },
      { id: "q4", name: "Mesa Flexora",        series: 3, reps: "15",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Lying-leg-curls-IM-top.png/640px-Lying-leg-curls-IM-top.png", tip: "Contraia o glúteo para maior estabilidade" },
      { id: "q5", name: "Panturrilha em Pé",   series: 4, reps: "20",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Standing-calf-raise-IM-top.png/640px-Standing-calf-raise-IM-top.png", tip: "Amplitude completa: calcanhar abaixo da plataforma" },
    ]
  },
  "Quinta": {
    label: "OMBRO + ABDÔMEN", icon: "🔥", color: "#F59E0B",
    exercises: [
      { id: "qu1", name: "Desenvolvimento Haltere", series: 4, reps: "10-12", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Seated-dumbbell-shoulder-press-IM-top.png/640px-Seated-dumbbell-shoulder-press-IM-top.png", tip: "Não arqueie demais a lombar no topo" },
      { id: "qu2", name: "Elevação Lateral",        series: 4, reps: "15",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Dumbbell-lateral-raise-IM-top.png/640px-Dumbbell-lateral-raise-IM-top.png", tip: "Cotovelos levemente flexionados, suba até a altura dos ombros" },
      { id: "qu3", name: "Elevação Frontal",        series: 3, reps: "12",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Dumbbell-front-raise-IM-top.png/640px-Dumbbell-front-raise-IM-top.png", tip: "Controle a descida para maior tensão" },
      { id: "qu4", name: "Abdominal Supra",         series: 4, reps: "20",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Crunch_XT.jpg/640px-Crunch_XT.jpg", tip: "Expire na contração, não puxe o pescoço" },
      { id: "qu5", name: "Prancha",                 series: 4, reps: "40-60s",img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Plank_exercise.jpg/640px-Plank_exercise.jpg", tip: "Corpo reto como uma prancha, glúteo contraído" },
      { id: "qu6", name: "Abdominal Bicicleta",     series: 3, reps: "20",    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/81/Bicycle_crunch.jpg/640px-Bicycle_crunch.jpg", tip: "Cotovelo toca o joelho oposto lentamente" },
    ]
  },
  "Sexta": {
    label: "CARDIO + FULL BODY", icon: "🏃", color: "#10B981",
    exercises: [
      { id: "sx1", name: "Esteira Ritmo Moderado", series: 1, reps: "20min",   img: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Treadmill_walking.jpg/640px-Treadmill_walking.jpg", tip: "Zona aeróbica: 60-70% da FC máxima" },
      { id: "sx2", name: "Bicicleta Ergométrica",  series: 1, reps: "15min",   img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Stationary_bicycle.jpg/640px-Stationary_bicycle.jpg", tip: "Mantenha cadência constante acima de 80rpm" },
      { id: "sx3", name: "Circuito Funcional",     series: 3, reps: "1 round", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Burpee.png/640px-Burpee.png", tip: "Burpee + Agachamento + Flexão + Prancha 30s cada" },
    ]
  },
};

const days = Object.keys(workoutPlan);
const todayIdx = new Date().getDay();
const todayName = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"][todayIdx];

let state = {
  activeDay: days.includes(todayName) ? todayName : days[0],
  completed: {}, loads: {}, history: {},
  view: "treino", editingKey: null, tempLoad: "", modalEx: null,
};

function loadStorage() {
  try { state.completed = JSON.parse(localStorage.getItem("fc_done") || "{}"); } catch {}
  try { state.loads     = JSON.parse(localStorage.getItem("fc_loads") || "{}"); } catch {}
  try { state.history   = JSON.parse(localStorage.getItem("fc_hist") || "{}"); } catch {}
}
function saveStorage() {
  try { localStorage.setItem("fc_done",  JSON.stringify(state.completed)); } catch {}
  try { localStorage.setItem("fc_loads", JSON.stringify(state.loads)); } catch {}
  try { localStorage.setItem("fc_hist",  JSON.stringify(state.history)); } catch {}
}
function prog(day) {
  const exs = workoutPlan[day].exercises;
  const done = exs.filter(e => state.completed[`${day}-${e.id}`]).length;
  return { done, total: exs.length, pct: exs.length ? Math.round((done/exs.length)*100) : 0 };
}
function rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function toggle(day, id) { const k=`${day}-${id}`; state.completed[k]=!state.completed[k]; saveStorage(); render(); }
function startEdit(k, load) { state.editingKey=k; state.tempLoad=load?String(load):""; render(); }
function cancelEdit() { state.editingKey=null; state.tempLoad=""; render(); }
function saveLoad(day, id) {
  const k=`${day}-${id}`, v=parseFloat(state.tempLoad);
  if (!isNaN(v)&&v>0) {
    state.loads[k]=v;
    const date=new Date().toLocaleDateString("pt-BR");
    if (!state.history[k]) state.history[k]=[];
    state.history[k]=[...state.history[k],{date,kg:v}].slice(-12);
  }
  state.editingKey=null; state.tempLoad=""; saveStorage(); render();
}
function openModal(ex) { state.modalEx=ex; render(); }
function closeModal() { state.modalEx=null; render(); }
function setView(v) { state.view=v; render(); }
function setDay(d) { state.activeDay=d; render(); }

function h(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for (const c of children.flat()) {
    if (c==null) continue;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
}

function renderApp() {
  const day = state.activeDay;
  const cur = workoutPlan[day];
  const accent = cur.color;
  const {done,total,pct} = prog(day);
  const weekDone = days.reduce((a,d)=>a+prog(d).done,0);

  // HEADER
  const header = h("div",{id:"header",style:{borderBottomColor:accent}},
    h("div",{class:"header-top"},
      h("div",{},
        h("div",{class:"header-label",style:{color:accent}},"SEMANA ATUAL"),
        h("div",{class:"header-title"},"TREINO FIBRADO 💪"),
      ),
      h("div",{class:"week-badge",style:{background:rgba(accent,.1),border:`1.5px solid ${rgba(accent,.27)}`}},
        h("div",{class:"week-badge-num",style:{color:accent}},String(weekDone)),
        h("div",{class:"week-badge-lbl"},"SEMANA"),
      ),
    ),
    h("div",{class:"nav"},
      ...[{v:"treino",l:"🏋 Treino"},{v:"progresso",l:"📈 Progresso"}].map(({v,l})=>
        h("button",{class:`nav-btn${state.view===v?" active":""}`,
          style:{background:state.view===v?accent:"#12121e",color:state.view===v?"#000":"#444",borderColor:state.view===v?accent:"#1e1e2e"},
          onClick:()=>setView(v)},l)
      )
    ),
  );

  let content;

  if (state.view==="treino") {
    // Day tabs
    const tabs = h("div",{class:"day-tabs"},
      ...days.map(d=>{
        const {done:dd,total:dt,pct:dp}=prog(d);
        const dc=workoutPlan[d].color;
        const isA=d===day, isT=d===todayName;
        const btn=h("button",{class:`day-btn${isA?" active":""}`,
          style:{background:isA?dc:"#0e0e1a",color:isA?"#000":isT?dc:"#555",borderColor:isA?dc:isT?rgba(dc,.4):"#1c1c2a"},
          onClick:()=>setDay(d)},
          h("div",{style:{fontSize:"20px",lineHeight:"1"}},workoutPlan[d].icon),
          h("div",{style:{fontSize:"12px",fontWeight:"800",marginTop:"4px"}},d),
          h("div",{style:{fontSize:"10px",fontWeight:"700",marginTop:"2px",color:isA?"rgba(0,0,0,0.7)":dc}},`${dd}/${dt}`),
        );
        if (!isA&&dp>0) {
          const bar=h("div",{style:{position:"absolute",bottom:"5px",left:"10%",right:"10%",height:"2px",background:"#1a1a2a",borderRadius:"1px"}},
            h("div",{style:{height:"100%",width:`${dp}%`,background:dc,borderRadius:"1px"}})
          );
          btn.appendChild(bar);
        }
        if (isT&&!isA) btn.appendChild(h("div",{class:"day-btn-dot",style:{background:dc}}));
        return btn;
      })
    );

    // Day info
    const info = h("div",{class:"day-info"},
      h("div",{class:"day-info-label",style:{color:accent}},`${cur.icon} ${day.toUpperCase()}${day===todayName?" — HOJE":""}`),
      h("div",{class:"day-info-title"},cur.label),
      h("div",{class:"prog-bar-meta"},
        h("span",{},`${done} de ${total} exercícios`),
        h("span",{style:{fontWeight:"800",color:pct===100?"#4ade80":accent}},`${pct}%`),
      ),
      h("div",{class:"prog-bar-bg"},
        h("div",{class:"prog-bar-fill",style:{width:`${pct}%`,background:`linear-gradient(90deg,${accent},${rgba(accent,.7)})`}})
      ),
    );

    // Cards
    const cards = h("div",{class:"cards"},
      ...cur.exercises.map((ex,i)=>{
        const k=`${day}-${ex.id}`;
        const isDone=!!state.completed[k];
        const load=state.loads[k];
        const hist=state.history[k]||[];
        const isEditing=state.editingKey===k;

        const checkBtn=h("button",{class:`check-btn${isDone?" done":""}`,
          style:{background:isDone?accent:"transparent",borderColor:isDone?accent:"#2a2a3a"},
          onClick:()=>toggle(day,ex.id)},isDone?"✓":"");

        const imgBtn=h("button",{class:"img-btn",
          style:{background:rgba(accent,.13),border:`1.5px solid ${rgba(accent,.33)}`,color:accent},
          onClick:()=>openModal(ex)},"📷 VER");

        const cardTop=h("div",{class:"card-top"},
          checkBtn,
          h("div",{class:"card-info"},
            h("div",{class:`card-name${isDone?" done":""}`},ex.name),
            h("div",{class:"card-sets"},`${ex.series} séries · ${ex.reps} reps`),
          ),
          imgBtn,
        );

        let loadContent;
        if (isEditing) {
          const input=h("input",{class:"load-input",type:"number",placeholder:"kg",style:{border:`1.5px solid ${accent}`}});
          input.value=state.tempLoad;
          input.addEventListener("input",e=>{state.tempLoad=e.target.value;});
          input.addEventListener("keydown",e=>{if(e.key==="Enter")saveLoad(day,ex.id);});
          setTimeout(()=>input.focus(),0);
          loadContent=h("div",{class:"load-input-wrap"},input,
            h("button",{class:"load-ok",style:{background:accent},onClick:()=>saveLoad(day,ex.id)},"OK"),
            h("button",{class:"load-cancel",onClick:cancelEdit},"✕"),
          );
        } else {
          const inner=load
            ? [h("span",{class:"load-kg",style:{color:accent}},String(load),h("span",{class:"load-unit"},"kg")),
               hist.length>=2&&(()=>{const diff=load-hist[hist.length-2].kg;return diff!==0?h("span",{class:"load-diff",style:{color:diff>0?"#4ade80":"#f87171"}},`${diff>0?"↑":"↓"}${Math.abs(diff)}kg`):null;})()].filter(Boolean)
            : [h("span",{class:"load-empty"},"sem carga registrada")];
          loadContent=h("div",{class:"load-display"},...inner,
            h("button",{class:"load-edit-btn",onClick:()=>startEdit(k,load)},load?"✏ EDITAR":"+ ADD"),
          );
        }

        const loadRow=h("div",{class:"card-load"},
          h("span",{class:"load-label"},"CARGA"),
          loadContent,
        );

        const card=h("div",{class:`card${isDone?" done":""}`,
          style:{animationDelay:`${i*.055}s`,borderColor:isDone?rgba(accent,.27):"#1c1c2a",background:isDone?rgba(accent,.055):"#0e0e1a"}},
          cardTop,loadRow);

        if (hist.length>1) {
          const mx=Math.max(...hist.map(x=>x.kg)), mn=Math.min(...hist.map(x=>x.kg));
          card.appendChild(h("div",{class:"sparkline"},
            ...hist.map((hh,hi)=>{
              const hp=mx===mn?50:((hh.kg-mn)/(mx-mn))*100;
              return h("div",{class:"spark-bar",title:`${hh.date}: ${hh.kg}kg`,
                style:{height:`${Math.max(4,hp*.22+4)}px`,background:hi===hist.length-1?accent:rgba(accent,.21)}});
            }),
            h("span",{style:{fontSize:"8px",color:"#252535",marginLeft:"4px"}},`${hist.length}x`),
          ));
        }
        return card;
      })
    );

    content = h("div",{},tabs,info,cards);

  } else {
    // PROGRESSO VIEW
    const grid = h("div",{class:"prog-grid"},
      ...days.map(d=>{
        const {done:dd,total:dt,pct:dp}=prog(d);
        const dc=workoutPlan[d].color;
        const complete=dd===dt&&dt>0;
        return h("div",{class:"prog-card",
          style:{borderColor:complete?rgba(dc,.53):"#1c1c2a"},
          onClick:()=>{state.activeDay=d;setView("treino");}},
          h("div",{class:"prog-card-head"},
            h("div",{},
              h("div",{class:"prog-card-label",style:{color:dc}},workoutPlan[d].label),
              h("div",{class:"prog-card-sub"},d.toUpperCase()),
            ),
            h("div",{class:"prog-card-pct",style:{color:complete?"#4ade80":dc}},`${dp}%`),
          ),
          h("div",{class:"prog-card-bar-bg"},h("div",{class:"prog-card-bar",style:{width:`${dp}%`,background:dc}})),
          h("div",{class:"prog-card-count"},`${dd}/${dt} concluídos`),
        );
      })
    );

    const histSections = days.map(d=>{
      const dc=workoutPlan[d].color;
      const withHist=workoutPlan[d].exercises.filter(ex=>(state.history[`${d}-${ex.id}`]||[]).length>0);
      if (!withHist.length) return null;
      return h("div",{class:"hist-section"},
        h("div",{class:"hist-day-lbl",style:{color:dc}},`${workoutPlan[d].icon} ${d.toUpperCase()} — ${workoutPlan[d].label}`),
        ...withHist.map(ex=>{
          const hist=state.history[`${d}-${ex.id}`];
          const last=hist[hist.length-1];
          const mx=Math.max(...hist.map(x=>x.kg)), mn=Math.min(...hist.map(x=>x.kg));
          return h("div",{class:"hist-card"},
            h("div",{class:"hist-card-head"},
              h("div",{class:"hist-card-name"},ex.name),
              h("div",{class:"hist-card-kg",style:{color:dc}},String(last.kg),h("small",{},"kg")),
            ),
            h("div",{class:"hist-sparkline"},
              ...hist.map((hh,hi)=>{
                const hp=mx===mn?50:((hh.kg-mn)/(mx-mn))*100;
                return h("div",{class:"hist-spark-bar",style:{height:`${Math.max(5,hp*.26+5)}px`,background:hi===hist.length-1?dc:rgba(dc,.21)}});
              })
            ),
            h("div",{class:"hist-dates"},h("span",{},hist[0].date),h("span",{},last.date)),
          );
        })
      );
    }).filter(Boolean);

    content = h("div",{class:"prog-view"},
      h("div",{class:"prog-section-lbl"},"VISÃO GERAL DA SEMANA"),
      grid,
      h("div",{class:"prog-section-lbl"},"HISTÓRICO DE CARGAS"),
      ...(histSections.length>0 ? histSections : [h("div",{class:"empty-hist"},
        h("div",{style:{fontSize:"48px",marginBottom:"14px"}},"📊"),
        h("div",{style:{fontSize:"15px",fontFamily:"Barlow,sans-serif"}},"Registre suas cargas para ver o histórico"),
      )]),
    );
  }

  // MODAL
  let modal = null;
  if (state.modalEx) {
    const ex = state.modalEx;
    const ac = workoutPlan[state.activeDay].color;

    const imgEl = h("img",{src:ex.img,alt:ex.name,style:{width:"100%",height:"100%",objectFit:"cover"}});
    imgEl.onerror = () => {
      imgEl.style.display="none";
      imgEl.parentNode.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:#444"><span style="font-size:48px">🏋️</span><p style="font-size:13px">${ex.name}</p></div>`;
    };

    modal = h("div",{class:"modal-overlay",onClick:closeModal},
      h("div",{class:"modal-box",
        style:{border:`1.5px solid ${rgba(ac,.33)}`,boxShadow:`0 0 100px ${rgba(ac,.15)},0 30px 80px rgba(0,0,0,0.8)`},
        onClick:e=>e.stopPropagation()},
        h("div",{class:"modal-header",style:{background:rgba(ac,.09),borderBottom:`1px solid ${rgba(ac,.13)}`}},
          h("div",{class:"modal-header-info"},
            h("div",{class:"modal-header-tag",style:{color:ac}},"EXERCÍCIO"),
            h("div",{class:"modal-header-name"},ex.name),
          ),
          h("button",{class:"modal-close",onClick:closeModal},"✕"),
        ),
        h("div",{class:"modal-img-wrap"},imgEl),
        h("div",{class:"modal-footer"},
          h("div",{class:"modal-tip",style:{background:rgba(ac,.08),border:`1px solid ${rgba(ac,.2)}`}},
            h("span",{style:{fontSize:"20px"}},"💡"),
            h("div",{class:"modal-tip-text"},ex.tip||""),
          ),
          h("div",{class:"modal-stats"},
            ...[{l:"SÉRIES",v:ex.series},{l:"REPS",v:ex.reps}].map(({l,v})=>
              h("div",{class:"modal-stat",style:{background:rgba(ac,.11),border:`1px solid ${rgba(ac,.22)}`}},
                h("div",{class:"modal-stat-val",style:{color:ac}},String(v)),
                h("div",{class:"modal-stat-lbl"},l),
              )
            )
          ),
        ),
      )
    );
  }

  const app = document.getElementById("app");
  app.innerHTML="";
  app.appendChild(header);
  app.appendChild(content);
  if (modal) app.appendChild(modal);

  document.onkeydown=(e)=>{if(e.key==="Escape"&&state.modalEx)closeModal();};
}

const render = renderApp;
loadStorage();
render();
</script>
</body>
</html>
