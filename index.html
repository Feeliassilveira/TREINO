<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Treino Fibrado 💪</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #070710;
    --bg2: #0e0e1a;
    --bg3: #0a0a14;
    --border: #1c1c2a;
    --text: #e8e8e0;
    --muted: #444;
    --dim: #252535;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-thumb { background: #252535; border-radius: 2px; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
  @keyframes modalPop { from { opacity:0; transform:scale(0.94) } to { opacity:1; transform:scale(1) } }
  @keyframes dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* HEADER */
  #header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg,#0e0e1c 0%,#070710 100%);
    padding: 16px 16px 12px;
    border-bottom: 2px solid var(--accent, #FF6B35);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .header-label { font-size: 9px; letter-spacing: 5px; font-weight: 700; color: var(--accent, #FF6B35); }
  .header-title { font-size: 24px; font-weight: 900; letter-spacing: 0.5px; line-height: 1.1; }
  .week-badge {
    background: rgba(255,107,53,0.1); border: 1.5px solid rgba(255,107,53,0.27);
    border-radius: 12px; padding: 8px 14px; text-align: center; min-width: 64px;
  }
  .week-badge-num { font-size: 24px; font-weight: 900; color: var(--accent, #FF6B35); line-height: 1; }
  .week-badge-lbl { font-size: 8px; color: #444; letter-spacing: 2px; margin-top: 2px; }

  /* NAV */
  .nav { display: flex; gap: 6px; }
  .nav-btn {
    flex: 1; padding: 9px 0; border-radius: 9px;
    font-family: inherit; font-weight: 800; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; transition: all .22s; border: 1px solid #1e1e2e;
    background: #12121e; color: #444;
  }
  .nav-btn.active { color: #000; }

  /* DAY TABS */
  .day-tabs { display: flex; gap: 6px; padding: 14px 14px 0; overflow-x: auto; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-btn {
    flex: 0 0 auto; min-width: 62px;
    background: var(--bg2); color: #555;
    border: 1.5px solid var(--border);
    border-radius: 13px; padding: 10px 8px 8px;
    font-family: inherit; cursor: pointer; transition: all .22s; position: relative;
    text-align: center;
  }
  .day-btn.active { color: #000; }
  .day-btn-icon { font-size: 20px; line-height: 1; }
  .day-btn-name { font-size: 12px; font-weight: 800; margin-top: 4px; }
  .day-btn-count { font-size: 10px; font-weight: 700; margin-top: 2px; }
  .day-btn-bar { position: absolute; bottom: 5px; left: 10%; right: 10%; height: 2px; background: #1a1a2a; border-radius: 1px; }
  .day-btn-bar-fill { height: 100%; border-radius: 1px; transition: width .3s; }
  .day-btn-dot { position: absolute; top: -4px; right: -4px; width: 10px; height: 10px; border-radius: 50%; animation: dot 2s infinite; }

  /* DAY INFO */
  .day-info { padding: 16px 16px 10px; }
  .day-info-label { font-size: 9px; letter-spacing: 5px; font-weight: 700; }
  .day-info-title { font-size: 30px; font-weight: 900; letter-spacing: 0.3px; }
  .prog-bar-wrap { margin-top: 10px; }
  .prog-bar-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .prog-bar-meta span { font-size: 11px; color: #444; }
  .prog-bar-meta .pct { font-weight: 800; }
  .prog-bar-bg { height: 4px; background: #14141e; border-radius: 2px; }
  .prog-bar-fill { height: 100%; border-radius: 2px; transition: width .5s; }

  /* EXERCISE CARDS */
  .cards { padding: 2px 14px 80px; display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    animation: fadeUp .3s ease both;
    transition: border-color .3s, background .3s;
  }
  .card.done { border-color: rgba(255,107,53,0.27); background: rgba(255,107,53,0.055); }
  .card-top { padding: 14px 14px 12px; display: flex; align-items: center; gap: 10; }
  .card-top { display: flex; align-items: center; gap: 10px; padding: 14px; }
  .check-btn {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    background: transparent; border: 2px solid #2a2a3a;
    color: #000; font-size: 16px; font-weight: 900; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .22s;
  }
  .check-btn.done { }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px; font-weight: 800; letter-spacing: 0.2px;
    color: #e8e8e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    transition: color .3s;
  }
  .card-name.done { color: #444; text-decoration: line-through; }
  .card-sets { font-size: 11px; color: #3a3a50; margin-top: 3px; font-family: 'Barlow', sans-serif; }
  .video-btn {
    flex-shrink: 0; border-radius: 10px; padding: 8px 12px;
    font-family: inherit; font-weight: 800; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 5px;
  }
  .card-load {
    border-top: 1px solid #14141e; padding: 10px 14px;
    background: var(--bg3); display: flex; align-items: center; gap: 10px;
  }
  .load-label { font-size: 9px; letter-spacing: 3px; color: #2a2a40; font-weight: 700; }
  .load-display { display: flex; align-items: center; gap: 8px; flex: 1; }
  .load-kg { font-size: 19px; font-weight: 900; }
  .load-unit { font-size: 10px; color: #444; font-weight: 400; }
  .load-diff { font-size: 11px; font-weight: 800; }
  .load-empty { font-size: 12px; color: #252535; font-family: 'Barlow', sans-serif; }
  .load-edit-btn {
    margin-left: auto; background: transparent; border: 1px solid #1e1e2e; color: #404060;
    border-radius: 7px; padding: 5px 11px;
    font-family: inherit; font-weight: 800; font-size: 10px; cursor: pointer;
  }
  .load-input-wrap { display: flex; gap: 6px; align-items: center; flex: 1; }
  .load-input {
    width: 72px; padding: 5px 10px;
    background: #16162a; border-radius: 7px;
    color: #fff; font-family: inherit; font-weight: 700; font-size: 14px; outline: none;
  }
  .load-ok { border: none; border-radius: 7px; padding: 5px 13px; font-family: inherit; font-weight: 800; font-size: 12px; cursor: pointer; color: #000; }
  .load-cancel { background: transparent; border: 1px solid #2a2a3a; color: #555; border-radius: 7px; padding: 5px 9px; font-family: inherit; font-weight: 700; font-size: 11px; cursor: pointer; }
  .sparkline { padding: 6px 14px 10px; display: flex; gap: 3px; align-items: flex-end; height: 26px; }
  .spark-bar { flex: 1; max-width: 22px; border-radius: 2px; transition: height .3s; }
  .spark-label { font-size: 8px; color: #252535; margin-left: 4px; white-space: nowrap; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.94); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-box {
    width: 100%; max-width: 580px; background: #0e0e1a;
    border-radius: 20px; overflow: hidden;
    animation: modalPop 0.25s ease;
  }
  .modal-header {
    padding: 16px 18px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,107,53,0.13);
  }
  .modal-header-info { flex: 1; }
  .modal-header-tag { font-size: 9px; letter-spacing: 4px; font-weight: 700; margin-bottom: 2px; }
  .modal-header-name { font-size: 18px; font-weight: 900; letter-spacing: 0.3px; line-height: 1.1; }
  .modal-close {
    width: 34px; height: 34px; border-radius: 10px;
    background: #1a1a28; border: 1px solid #2a2a3a;
    color: #666; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-video { position: relative; padding-bottom: 56.25%; background: #000; }
  .modal-video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .modal-footer { padding: 14px 18px 16px; background: #0a0a14; }
  .modal-tip { border-radius: 10px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .modal-tip-text { font-size: 12px; color: #aaa; line-height: 1.5; font-family: 'Barlow', sans-serif; }
  .modal-stats { display: flex; gap: 8px; }
  .modal-stat { flex: 1; text-align: center; border-radius: 10px; padding: 10px 8px; }
  .modal-stat-val { font-size: 24px; font-weight: 900; line-height: 1; }
  .modal-stat-lbl { font-size: 9px; color: #555; letter-spacing: 3px; margin-top: 4px; }

  /* PROGRESSO */
  .prog-view { padding: 18px 14px 80px; }
  .prog-section-lbl { font-size: 9px; letter-spacing: 5px; color: #333; font-weight: 700; margin-bottom: 12px; }
  .prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 28px; }
  .prog-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; cursor: pointer;
  }
  .prog-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .prog-card-label { font-size: 12px; font-weight: 800; }
  .prog-card-sub { font-size: 9px; color: #333; letter-spacing: 1px; }
  .prog-card-pct { font-size: 22px; font-weight: 900; }
  .prog-card-bar-bg { height: 3px; background: #14141e; border-radius: 2px; }
  .prog-card-bar { height: 100%; border-radius: 2px; }
  .prog-card-count { font-size: 9px; color: #2a2a3a; margin-top: 6px; }
  .hist-section { margin-bottom: 18px; }
  .hist-day-lbl { font-size: 11px; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; }
  .hist-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
  }
  .hist-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hist-card-name { font-size: 13px; font-weight: 800; }
  .hist-card-kg { font-size: 20px; font-weight: 900; }
  .hist-card-kg small { font-size: 10px; color: #444; }
  .hist-sparkline { display: flex; gap: 3px; align-items: flex-end; height: 28px; }
  .hist-spark-bar { flex: 1; border-radius: 2px; }
  .hist-dates { display: flex; justify-content: space-between; margin-top: 4px; }
  .hist-dates span { font-size: 8px; color: #252535; }
  .empty-hist { text-align: center; padding: 50px 20px; color: #252535; }
  .empty-hist-icon { font-size: 48px; margin-bottom: 14px; }
  .empty-hist-text { font-size: 15px; font-family: 'Barlow', sans-serif; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const workoutPlan = {
  "Segunda": {
    label: "PEITO + TRÍCEPS", icon: "🏋️", color: "#FF6B35",
    exercises: [
      { id: "s1", name: "Supino Reto com Barra",    series: 4, reps: "10-12", videoId: "rT7DgCr-bIo", tip: "Mantenha os pés no chão e escápulas retraídas" },
      { id: "s2", name: "Supino Inclinado Haltere",  series: 3, reps: "12",    videoId: "DbFgADa20jA", tip: "Incline o banco a 30-45° para focar na parte superior" },
      { id: "s3", name: "Crucifixo na Polia",        series: 3, reps: "15",    videoId: "taI4XduLpTk", tip: "Mantenha leve flexão nos cotovelos durante todo o movimento" },
      { id: "s4", name: "Tríceps Corda na Polia",    series: 4, reps: "12-15", videoId: "2-LAMcpzODU", tip: "Abra a corda no final para maior contração" },
      { id: "s5", name: "Tríceps Testa",             series: 3, reps: "12",    videoId: "d_KZxkY_5cM", tip: "Mantenha os cotovelos fixos apontando para o teto" },
    ]
  },
  "Terça": {
    label: "COSTAS + BÍCEPS", icon: "🦅", color: "#4ECDC4",
    exercises: [
      { id: "t1", name: "Puxada Frontal",   series: 4, reps: "10-12", videoId: "CAwf7n6Luuc", tip: "Puxe até o queixo e contraia as escápulas" },
      { id: "t2", name: "Remada Curvada",   series: 4, reps: "10-12", videoId: "FWJR5Ve8bnQ", tip: "Mantenha as costas retas e puxe até o umbigo" },
      { id: "t3", name: "Remada Cavalinho", series: 3, reps: "12",    videoId: "xQNrFHEMhI4", tip: "Coxas paralelas ao chão, puxe com os cotovelos" },
      { id: "t4", name: "Rosca Direta",     series: 3, reps: "12",    videoId: "ykJmrZ5v0Oo", tip: "Não balance o corpo, isolamento total do bíceps" },
      { id: "t5", name: "Rosca Martelo",    series: 3, reps: "12",    videoId: "zC3nLlEvin4", tip: "Polegar aponta para o teto em todo o movimento" },
    ]
  },
  "Quarta": {
    label: "PERNAS + GLÚTEO", icon: "🦵", color: "#A855F7",
    exercises: [
      { id: "q1", name: "Agachamento Livre",   series: 4, reps: "10-12", videoId: "ultWZbUMPL8", tip: "Joelhos na direção dos pés, desça até 90°" },
      { id: "q2", name: "Leg Press",           series: 4, reps: "12-15", videoId: "IZxyjW7MPJQ", tip: "Não trave os joelhos na extensão" },
      { id: "q3", name: "Cadeira Extensora",   series: 3, reps: "15",    videoId: "YyvSfVjQeL0", tip: "Segure 1s no topo para maior ativação" },
      { id: "q4", name: "Mesa Flexora",        series: 3, reps: "15",    videoId: "1Tq3QdYUuHs", tip: "Contraia o glúteo para maior estabilidade" },
      { id: "q5", name: "Panturrilha em Pé",   series: 4, reps: "20",    videoId: "JbyjNymZOt0", tip: "Amplitude completa: calcanhar abaixo da plataforma" },
    ]
  },
  "Quinta": {
    label: "OMBRO + ABDÔMEN", icon: "🔥", color: "#F59E0B",
    exercises: [
      { id: "qu1", name: "Desenvolvimento Haltere", series: 4, reps: "10-12", videoId: "qEwKCR5JaTs", tip: "Não arqueie demais a lombar no topo" },
      { id: "qu2", name: "Elevação Lateral",        series: 4, reps: "15",    videoId: "3VcKaXpzqRo", tip: "Cotovelos levemente flexionados, suba até a altura dos ombros" },
      { id: "qu3", name: "Elevação Frontal",        series: 3, reps: "12",    videoId: "gkfb2RxFP4c", tip: "Controle a descida para maior tensão" },
      { id: "qu4", name: "Abdominal Supra",         series: 4, reps: "20",    videoId: "Xyd_fa5zoEU", tip: "Expire na contração, não puxe o pescoço" },
      { id: "qu5", name: "Prancha",                 series: 4, reps: "40-60s",videoId: "pSHjTRCQxIw", tip: "Corpo reto como uma prancha, glúteo contraído" },
      { id: "qu6", name: "Abdominal Bicicleta",     series: 3, reps: "20",    videoId: "9FGilxCbdz8", tip: "Cotovelo toca o joelho oposto lentamente" },
    ]
  },
  "Sexta": {
    label: "CARDIO + FULL BODY", icon: "🏃", color: "#10B981",
    exercises: [
      { id: "sx1", name: "Esteira Ritmo Moderado", series: 1, reps: "20min",   videoId: "kZDvg9oNzKo", tip: "Zona aeróbica: 60-70% da FC máxima" },
      { id: "sx2", name: "Bicicleta Ergométrica",  series: 1, reps: "15min",   videoId: "qMKCVzLgebM", tip: "Mantenha cadência constante acima de 80rpm" },
      { id: "sx3", name: "Circuito Funcional",     series: 3, reps: "1 round", videoId: "ml6cT4AZwOI", tip: "Burpee + Agachamento + Flexão + Prancha 30s cada" },
    ]
  },
};

const days = Object.keys(workoutPlan);
const todayIdx = new Date().getDay();
const todayName = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"][todayIdx];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  activeDay: days.includes(todayName) ? todayName : days[0],
  completed: {},
  loads: {},
  history: {},
  view: "treino",
  editingKey: null,
  tempLoad: "",
  videoEx: null,
};

function loadStorage() {
  try { state.completed = JSON.parse(localStorage.getItem("fc_done") || "{}"); } catch {}
  try { state.loads     = JSON.parse(localStorage.getItem("fc_loads") || "{}"); } catch {}
  try { state.history   = JSON.parse(localStorage.getItem("fc_hist") || "{}"); } catch {}
}
function saveStorage() {
  try { localStorage.setItem("fc_done",  JSON.stringify(state.completed)); } catch {}
  try { localStorage.setItem("fc_loads", JSON.stringify(state.loads)); } catch {}
  try { localStorage.setItem("fc_hist",  JSON.stringify(state.history)); } catch {}
}

function prog(day) {
  const exs = workoutPlan[day].exercises;
  const done = exs.filter(e => state.completed[`${day}-${e.id}`]).length;
  return { done, total: exs.length, pct: exs.length ? Math.round((done / exs.length) * 100) : 0 };
}

function weekStats() {
  return {
    done:  days.reduce((a, d) => a + prog(d).done, 0),
    total: days.reduce((a, d) => a + workoutPlan[d].exercises.length, 0),
  };
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggle(day, id) {
  const k = `${day}-${id}`;
  state.completed[k] = !state.completed[k];
  saveStorage(); render();
}

function startEdit(k, currentLoad) {
  state.editingKey = k;
  state.tempLoad = currentLoad ? String(currentLoad) : "";
  render();
}

function cancelEdit() {
  state.editingKey = null;
  state.tempLoad = "";
  render();
}

function saveLoad(day, id) {
  const k = `${day}-${id}`;
  const v = parseFloat(state.tempLoad);
  if (!isNaN(v) && v > 0) {
    state.loads[k] = v;
    const date = new Date().toLocaleDateString("pt-BR");
    if (!state.history[k]) state.history[k] = [];
    state.history[k] = [...state.history[k], { date, kg: v }].slice(-12);
  }
  state.editingKey = null;
  state.tempLoad = "";
  saveStorage(); render();
}

function openVideo(ex) { state.videoEx = ex; render(); }
function closeVideo() { state.videoEx = null; render(); }
function setView(v) { state.view = v; render(); }
function setDay(d) { state.activeDay = d; render(); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}

function cssVar(color, alpha) {
  if (!alpha) return color;
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderHeader() {
  const cur = workoutPlan[state.activeDay];
  const accent = cur.color;
  const ws = weekStats();

  return el("div", { id: "header", style: { borderBottomColor: accent } },
    el("div", { class: "header-top" },
      el("div", {},
        el("div", { class: "header-label", style: { color: accent } }, "SEMANA ATUAL"),
        el("div", { class: "header-title" }, "TREINO FIBRADO 💪"),
      ),
      el("div", { class: "week-badge", style: {
        background: cssVar(accent, 0.1),
        border: `1.5px solid ${cssVar(accent, 0.27)}`,
      }},
        el("div", { class: "week-badge-num", style: { color: accent } }, `${ws.done}`),
        el("div", { class: "week-badge-lbl" }, "SEMANA"),
      ),
    ),
    el("div", { class: "nav" },
      ...([{ v: "treino", label: "🏋 Treino" }, { v: "progresso", label: "📈 Progresso" }].map(({ v, label }) =>
        el("button", {
          class: `nav-btn${state.view === v ? " active" : ""}`,
          style: {
            background: state.view === v ? accent : "#12121e",
            color: state.view === v ? "#000" : "#444",
            borderColor: state.view === v ? accent : "#1e1e2e",
          },
          onClick: () => setView(v),
        }, label)
      )),
    ),
  );
}

function renderDayTabs() {
  return el("div", { class: "day-tabs" },
    ...days.map(day => {
      const { done: dd, total: dt, pct: dp } = prog(day);
      const dc = workoutPlan[day].color;
      const isA = day === state.activeDay;
      const isToday = day === todayName;
      const btn = el("button", {
        class: `day-btn${isA ? " active" : ""}`,
        style: {
          background: isA ? dc : "#0e0e1a",
          color: isA ? "#000" : isToday ? dc : "#555",
          borderColor: isA ? dc : isToday ? cssVar(dc, 0.4) : "#1c1c2a",
        },
        onClick: () => setDay(day),
      },
        el("div", { class: "day-btn-icon" }, workoutPlan[day].icon),
        el("div", { class: "day-btn-name" }, day),
        el("div", { class: "day-btn-count", style: { color: isA ? "rgba(0,0,0,0.7)" : dc } }, `${dd}/${dt}`),
      );
      if (!isA && dp > 0) {
        const bar = el("div", { class: "day-btn-bar" },
          el("div", { class: "day-btn-bar-fill", style: { width: `${dp}%`, background: dc } })
        );
        btn.appendChild(bar);
      }
      if (isToday && !isA) {
        const dot = el("div", { class: "day-btn-dot", style: { background: dc } });
        btn.appendChild(dot);
      }
      return btn;
    })
  );
}

function renderDayInfo() {
  const cur = workoutPlan[state.activeDay];
  const accent = cur.color;
  const { done, total, pct } = prog(state.activeDay);
  return el("div", { class: "day-info" },
    el("div", { class: "day-info-label", style: { color: accent } },
      `${cur.icon} ${state.activeDay.toUpperCase()}${state.activeDay === todayName ? " — HOJE" : ""}`
    ),
    el("div", { class: "day-info-title" }, cur.label),
    el("div", { class: "prog-bar-wrap" },
      el("div", { class: "prog-bar-meta" },
        el("span", {}, `${done} de ${total} exercícios`),
        el("span", { class: "pct", style: { color: pct === 100 ? "#4ade80" : accent } }, `${pct}%`),
      ),
      el("div", { class: "prog-bar-bg" },
        el("div", { class: "prog-bar-fill", style: {
          width: `${pct}%`,
          background: `linear-gradient(90deg, ${accent}, ${cssVar(accent, 0.7)})`,
        }})
      ),
    ),
  );
}

function renderCard(ex, i) {
  const day = state.activeDay;
  const accent = workoutPlan[day].color;
  const k = `${day}-${ex.id}`;
  const isDone = !!state.completed[k];
  const load = state.loads[k];
  const hist = state.history[k] || [];
  const isEditing = state.editingKey === k;

  const checkBtn = el("button", {
    class: `check-btn${isDone ? " done" : ""}`,
    style: {
      background: isDone ? accent : "transparent",
      borderColor: isDone ? accent : "#2a2a3a",
    },
    onClick: () => toggle(day, ex.id),
  }, isDone ? "✓" : "");

  const nameEl = el("div", { class: `card-name${isDone ? " done" : ""}` }, ex.name);
  const setsEl = el("div", { class: "card-sets" }, `${ex.series} séries · ${ex.reps} reps`);
  const info = el("div", { class: "card-info" }, nameEl, setsEl);

  const videoBtn = el("button", {
    class: "video-btn",
    style: {
      background: cssVar(accent, 0.13),
      border: `1.5px solid ${cssVar(accent, 0.33)}`,
      color: accent,
    },
    onClick: () => openVideo(ex),
  }, "▶ VER");

  const cardTop = el("div", { class: "card-top" }, checkBtn, info, videoBtn);

  // Load row
  let loadContent;
  if (isEditing) {
    const input = el("input", {
      class: "load-input",
      type: "number",
      placeholder: "kg",
      style: { border: `1.5px solid ${accent}` },
    });
    input.value = state.tempLoad;
    input.addEventListener("input", e => { state.tempLoad = e.target.value; });
    input.addEventListener("keydown", e => { if (e.key === "Enter") saveLoad(day, ex.id); });
    setTimeout(() => input.focus(), 0);

    const okBtn = el("button", { class: "load-ok", style: { background: accent }, onClick: () => saveLoad(day, ex.id) }, "OK");
    const cancelBtn = el("button", { class: "load-cancel", onClick: cancelEdit }, "✕");
    loadContent = el("div", { class: "load-input-wrap" }, input, okBtn, cancelBtn);
  } else {
    let inner;
    if (load) {
      const diffEl = (() => {
        if (hist.length >= 2) {
          const diff = load - hist[hist.length - 2].kg;
          if (diff !== 0) return el("span", {
            class: "load-diff",
            style: { color: diff > 0 ? "#4ade80" : "#f87171" },
          }, `${diff > 0 ? "↑" : "↓"}${Math.abs(diff)}kg`);
        }
        return null;
      })();
      inner = [
        el("span", { class: "load-kg", style: { color: accent } },
          String(load), el("span", { class: "load-unit" }, "kg")
        ),
        diffEl,
      ].filter(Boolean);
    } else {
      inner = [el("span", { class: "load-empty" }, "sem carga registrada")];
    }
    const editBtn = el("button", {
      class: "load-edit-btn",
      onClick: () => startEdit(k, load),
    }, load ? "✏ EDITAR" : "+ ADD");

    loadContent = el("div", { class: "load-display" }, ...inner, editBtn);
  }

  const loadRow = el("div", { class: "card-load" },
    el("span", { class: "load-label" }, "CARGA"),
    loadContent,
  );

  const card = el("div", {
    class: `card${isDone ? " done" : ""}`,
    style: {
      animationDelay: `${i * 0.055}s`,
      borderColor: isDone ? cssVar(accent, 0.27) : "#1c1c2a",
      background: isDone ? cssVar(accent, 0.055) : "#0e0e1a",
    },
  }, cardTop, loadRow);

  // Sparkline
  if (hist.length > 1) {
    const mx = Math.max(...hist.map(x => x.kg));
    const mn = Math.min(...hist.map(x => x.kg));
    const bars = hist.map((h, hi) => {
      const hp = mx === mn ? 50 : ((h.kg - mn) / (mx - mn)) * 100;
      return el("div", {
        class: "spark-bar",
        title: `${h.date}: ${h.kg}kg`,
        style: {
          height: `${Math.max(4, hp * 0.22 + 4)}px`,
          background: hi === hist.length - 1 ? accent : cssVar(accent, 0.21),
        },
      });
    });
    const sparkline = el("div", { class: "sparkline" }, ...bars,
      el("span", { class: "spark-label" }, `${hist.length}x`),
    );
    card.appendChild(sparkline);
  }

  return card;
}

function renderTreinoView() {
  const cur = workoutPlan[state.activeDay];
  const cards = el("div", { class: "cards" },
    ...cur.exercises.map((ex, i) => renderCard(ex, i))
  );
  return el("div", {}, renderDayTabs(), renderDayInfo(), cards);
}

function renderProgressoView() {
  const dayCards = el("div", { class: "prog-grid" },
    ...days.map(day => {
      const { done: dd, total: dt, pct: dp } = prog(day);
      const dc = workoutPlan[day].color;
      const complete = dd === dt && dt > 0;
      return el("div", {
        class: "prog-card",
        style: { borderColor: complete ? cssVar(dc, 0.53) : "#1c1c2a" },
        onClick: () => { state.activeDay = day; setView("treino"); },
      },
        el("div", { class: "prog-card-head" },
          el("div", {},
            el("div", { class: "prog-card-label", style: { color: dc } }, workoutPlan[day].label),
            el("div", { class: "prog-card-sub" }, day.toUpperCase()),
          ),
          el("div", { class: "prog-card-pct", style: { color: complete ? "#4ade80" : dc } }, `${dp}%`),
        ),
        el("div", { class: "prog-card-bar-bg" },
          el("div", { class: "prog-card-bar", style: { width: `${dp}%`, background: dc } })
        ),
        el("div", { class: "prog-card-count" }, `${dd}/${dt} concluídos`),
      );
    })
  );

  const histSections = days.map(day => {
    const dc = workoutPlan[day].color;
    const withHist = workoutPlan[day].exercises.filter(ex => (state.history[`${day}-${ex.id}`] || []).length > 0);
    if (!withHist.length) return null;

    const histCards = withHist.map(ex => {
      const hist = state.history[`${day}-${ex.id}`];
      const last = hist[hist.length - 1];
      const mx = Math.max(...hist.map(x => x.kg));
      const mn = Math.min(...hist.map(x => x.kg));
      const sparkBars = hist.map((h, hi) => {
        const hp = mx === mn ? 50 : ((h.kg - mn) / (mx - mn)) * 100;
        return el("div", {
          class: "hist-spark-bar",
          title: `${h.date}: ${h.kg}kg`,
          style: {
            height: `${Math.max(5, hp * 0.26 + 5)}px`,
            background: hi === hist.length - 1 ? dc : cssVar(dc, 0.21),
          },
        });
      });
      return el("div", { class: "hist-card" },
        el("div", { class: "hist-card-head" },
          el("div", { class: "hist-card-name" }, ex.name),
          el("div", { class: "hist-card-kg", style: { color: dc } }, String(last.kg), el("small", {}, "kg")),
        ),
        el("div", { class: "hist-sparkline" }, ...sparkBars),
        el("div", { class: "hist-dates" },
          el("span", {}, hist[0].date),
          el("span", {}, last.date),
        ),
      );
    });

    return el("div", { class: "hist-section" },
      el("div", { class: "hist-day-lbl", style: { color: dc } },
        `${workoutPlan[day].icon} ${day.toUpperCase()} — ${workoutPlan[day].label}`
      ),
      ...histCards,
    );
  }).filter(Boolean);

  const emptyOrHist = histSections.length > 0
    ? histSections
    : [el("div", { class: "empty-hist" },
        el("div", { class: "empty-hist-icon" }, "📊"),
        el("div", { class: "empty-hist-text" }, "Registre suas cargas para ver o histórico"),
      )];

  return el("div", { class: "prog-view" },
    el("div", { class: "prog-section-lbl" }, "VISÃO GERAL DA SEMANA"),
    dayCards,
    el("div", { class: "prog-section-lbl" }, "HISTÓRICO DE CARGAS"),
    ...emptyOrHist,
  );
}

function renderModal() {
  const ex = state.videoEx;
  const accent = workoutPlan[state.activeDay].color;

  const box = el("div", {
    class: "modal-box",
    style: { border: `1.5px solid ${cssVar(accent, 0.33)}`, boxShadow: `0 0 100px ${cssVar(accent, 0.15)}, 0 30px 80px rgba(0,0,0,0.8)` },
    onClick: e => e.stopPropagation(),
  },
    el("div", { class: "modal-header", style: { background: cssVar(accent, 0.095), borderBottomColor: cssVar(accent, 0.13) } },
      el("div", { class: "modal-header-info" },
        el("div", { class: "modal-header-tag", style: { color: accent } }, "TUTORIAL"),
        el("div", { class: "modal-header-name" }, ex.name),
      ),
      el("button", { class: "modal-close", onClick: closeVideo }, "✕"),
    ),
    el("div", { class: "modal-video" },
      el("iframe", {
        src: `https://www.youtube.com/embed/${ex.videoId}?autoplay=1&rel=0&modestbranding=1`,
        allow: "autoplay; encrypted-media; fullscreen",
        allowfullscreen: "",
        title: ex.name,
      }),
    ),
    el("div", { class: "modal-footer" },
      el("div", { class: "modal-tip", style: { background: cssVar(accent, 0.083), border: `1px solid ${cssVar(accent, 0.19)}` } },
        el("span", { style: { fontSize: "18px" } }, "💡"),
        el("div", { class: "modal-tip-text" }, ex.tip || ""),
      ),
      el("div", { class: "modal-stats" },
        ...([{ l: "SÉRIES", v: ex.series }, { l: "REPS", v: ex.reps }].map(({ l, v }) =>
          el("div", { class: "modal-stat", style: { background: cssVar(accent, 0.11), border: `1px solid ${cssVar(accent, 0.22)}` } },
            el("div", { class: "modal-stat-val", style: { color: accent } }, String(v)),
            el("div", { class: "modal-stat-lbl" }, l),
          )
        )),
      ),
    ),
  );

  return el("div", { class: "modal-overlay", onClick: closeVideo }, box);
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const header = renderHeader();

  let content;
  if (state.view === "treino") content = renderTreinoView();
  else content = renderProgressoView();

  app.appendChild(header);
  app.appendChild(content);

  if (state.videoEx) app.appendChild(renderModal());

  // ESC to close modal
  document.onkeydown = (e) => { if (e.key === "Escape" && state.videoEx) closeVideo(); };
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadStorage();
render();
</script>
</body>
</html>
